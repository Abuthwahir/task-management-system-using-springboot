# MySQL Properties
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/task_management_system?createDatabaseIfNotExist=true&useUnicode=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL57Dialect
spring.jpa.open-in-view=false
app.cors.allowed-origin=${APP_CORS_ALLOWED_ORIGIN:http://localhost:3000}
app.cors.allowed-origin-pattern=${APP_CORS_ALLOWED_ORIGIN_PATTERN:http://localhost:*}
jwt.secret=${JWT_SECRET:task-management-dev-secret-change-me}
spring.mvc.pathmatch.matching-strategy=ant_path_matcher


spring.jackson.serialization.fail-on-empty-beans=false
